<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltaic | Select View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top right, #f8fafc, #eff6ff); 
            font-family: 'Inter', sans-serif; 
        }
        .nav-card {
            background: white;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }
        .nav-card:hover {
            transform: translateY(-10px);
            border-color: #3b82f6;
            box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.15);
        }
        .nav-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: #3b82f6;
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }
        .nav-card:hover::before { transform: scaleX(1); }
        .icon-circle {
            background: #f1f5f9;
            transition: all 0.4s ease;
        }
        .nav-card:hover .icon-circle {
            background: #3b82f6;
            color: white;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <nav class="fixed top-0 left-0 right-0 p-6 flex justify-end items-center pointer-events-none">
        <div class="flex items-center gap-4 pointer-events-auto bg-white/40 backdrop-blur-md p-2 rounded-full border border-white/20 shadow-sm">  
            <i data-lucide="help-circle" class="text-gray-400 w-5 h-5 cursor-pointer hover:text-gray-600 transition"></i>  
            <i data-lucide="bell" class="text-gray-400 w-5 h-5 cursor-pointer hover:text-gray-600 transition"></i>  
              
            <a href="profile.html" class="flex items-center gap-2 pr-3 hover:bg-white rounded-full transition group">  
                <img src="https://ui-avatars.com/api/?name=Energiq+User&background=0284c7&color=fff"   
                     alt="User Profile"   
                     class="w-8 h-8 rounded-full border border-gray-200">  
                <span class="text-xs font-semibold text-gray-600">Profile</span>
            </a>  
        </div>
    </nav>

    <div class="max-w-5xl w-full mt-12">
        <header class="text-center mb-12">
            <div class="flex justify-center mb-4">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-100">
                    <i data-lucide="zap" class="text-white w-8 h-8"></i>
                </div>
            </div>
            
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Analytics Engine</h1>
            <p class="text-slate-500 mt-2 text-lg">Choose your data resolution to begin monitoring</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <a href="analysis.html" class="nav-card rounded-3xl p-8 flex flex-col items-center text-center group">
                <div class="icon-circle w-20 h-20 rounded-full flex items-center justify-center mb-6 text-blue-600">
                    <i data-lucide="activity" class="w-10 h-10"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Latest</h2>
                <p class="text-slate-500 mt-3 text-sm">Live data streaming directly from your meter pins.</p>
                <span class="mt-8 text-blue-600 font-semibold flex items-center gap-2">
                    Enter Live <i data-lucide="arrow-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></i>
                </span>
            </a>

            <a href="daily.html" class="nav-card rounded-3xl p-8 flex flex-col items-center text-center group">
                <div class="icon-circle w-20 h-20 rounded-full flex items-center justify-center mb-6 text-blue-600">
                    <i data-lucide="calendar" class="w-10 h-10"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Daily</h2>
                <p class="text-slate-500 mt-3 text-sm">24-hour trends and peak consumption analysis.</p>
                <span class="mt-8 text-blue-600 font-semibold flex items-center gap-2">
                    View Day <i data-lucide="arrow-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></i>
                </span>
            </a>

            <a href="monthly.html" class="nav-card rounded-3xl p-8 flex flex-col items-center text-center group">
                <div class="icon-circle w-20 h-20 rounded-full flex items-center justify-center mb-6 text-blue-600">
                    <i data-lucide="bar-chart-3" class="w-10 h-10"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Monthly</h2>
                <p class="text-slate-500 mt-3 text-sm">Long-term billing and efficiency reporting.</p>
                <span class="mt-8 text-blue-600 font-semibold flex items-center gap-2">
                    Open Monthly <i data-lucide="arrow-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></i>
                </span>
            </a>

        </div>

        
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
