<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voltaic | Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; }
.hero-bg {
    background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
}
</style>
</head>

<body class="hero-bg min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-3xl p-10 w-full max-w-md border border-slate-100">

    <h2 class="text-3xl font-bold text-center mb-8">Register</h2>

    <input id="meterId" type="text" placeholder="Meter ID"
        class="w-full mb-4 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500">

    <input id="password" type="password" placeholder="Password"
        class="w-full mb-6 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500">

    <button onclick="registerUser()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-full font-semibold transition">
        Register
    </button>

    <p class="text-center text-sm text-slate-500 mt-6">
        Already have an account?
        <a href="login.html" class="text-blue-600 font-semibold">Login</a>
    </p>

    <p id="message" class="text-center mt-4 text-red-500"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
        apiKey: "xxx",
        authDomain: "xxx",
        projectId: "xxx",
        storageBucket: "xxx",
        messagingSenderId: "xxx",
        appId: "xxx"
    };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function convertToEmail(meterId){
    return meterId + "@voltaic.com";
}

window.registerUser = async function(){

    const meterId = document.getElementById("meterId").value.trim();
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");

    if(!meterId || !password){
        message.innerText = "All fields required.";
        return;
    }

    const meterRef = doc(db, "esp_devices", meterId);
    const meterSnap = await getDoc(meterRef);

    if(!meterSnap.exists()){
        message.innerText = "Invalid Meter ID.";
        return;
    }

    const meterData = meterSnap.data();

    if(meterData.status === "blocked"){
        message.innerText = "Registration blocked.";
        return;
    }

    if(meterData.status === "active"){
        message.innerText = "Meter already registered.";
        return;
    }

    const email = convertToEmail(meterId);

    try{
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const uid = userCredential.user.uid;

        await setDoc(doc(db, "users", uid), {
            esp_id: meterId,
            created_at: serverTimestamp()
        });

        await updateDoc(meterRef, { status: "active" });

        window.location.href = "hub.html";

    } catch(error){
        message.innerText = error.message;
    }
};

</script>

</body>

</html>
