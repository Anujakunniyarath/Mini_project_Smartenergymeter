<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voltaic | Smart Energy Monitoring</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }

        .hero-bg {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        }

        .circuit-line {
            position: absolute;
            background: linear-gradient(to right, #3b82f6, #93c5fd);
            height: 2px;
            border-radius: 2px;
            opacity: 0.3;
        }

        .circuit-node {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #3b82f6;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(59,130,246,0.4);
            opacity: 0.6;
        }
    </style>
</head>

<body class="hero-bg min-h-screen text-slate-900 relative overflow-hidden">

    <!-- Circuit Lines -->
    <div class="circuit-line w-72 top-32 left-0"></div>
    <div class="circuit-node top-[126px] left-[280px]"></div>

    <div class="circuit-line w-60 top-60 right-0"></div>
    <div class="circuit-node top-[234px] right-[240px]"></div>

    <div class="circuit-line w-96 bottom-40 left-20"></div>
    <div class="circuit-node bottom-[152px] left-[420px]"></div>

    <!-- Navbar -->
    <nav class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto relative z-10">
        <div class="flex items-center space-x-2">
            <svg class="w-8 h-8 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            <span class="text-2xl font-bold tracking-tight">Voltaic</span>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="max-w-7xl mx-auto px-8 pt-16 pb-24 grid md:grid-cols-2 gap-16 items-center relative z-10">

        <!-- Left Content -->
        <div class="space-y-8">
            <h1 class="text-6xl font-bold leading-[1.05] tracking-tight">
                Smart Way to <br>
                Monitor Your <br>
                Electricity
            </h1>

            <p class="text-xl text-slate-600 max-w-lg leading-relaxed">
                Check your power usage anytime, avoid unnecessary waste, and manage your electricity bills better with our simple and easy-to-use IoT energy monitoring system.
            </p>

            <button class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-full text-lg font-semibold transition duration-300 shadow-lg shadow-blue-200">
                <a href="login.html">Get Started</a>
            </button>
        </div>

        <!-- Right Image -->
        <div class="relative">
            <div class="absolute -top-12 -right-12 w-72 h-72 bg-blue-100 rounded-full blur-3xl opacity-30"></div>

            <div class="relative bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden transform hover:scale-[1.02] transition duration-500">
                <img src="https://miro.medium.com/v2/resize:fit:720/format:webp/1*8LZSZ41RJoTNQc3BnFlRzw.jpeg" 
                     alt="Dashboard Preview" 
                     class="w-full h-auto">
            </div>

            <div class="mx-auto w-[90%] h-4 bg-slate-200 rounded-b-2xl shadow-sm border-t border-slate-300"></div>
        </div>

    </main>

</body>
</html>
