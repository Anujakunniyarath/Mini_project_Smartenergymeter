<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voltaic | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; }
.hero-bg {
    background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
}
</style>
</head>

<body class="hero-bg min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-3xl p-10 w-full max-w-md border border-slate-100">

    <h2 class="text-3xl font-bold text-center mb-8">Login</h2>

    <input id="meterId" type="text" placeholder="Meter ID"
        class="w-full mb-4 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500">

    <input id="password" type="password" placeholder="Password"
        class="w-full mb-6 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-blue-500">

    <button onclick="loginUser()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-full font-semibold transition">
        Login
    </button>

    <p class="text-center text-sm text-slate-500 mt-6">
        Don't have an account?
        <a href="register.html" class="text-blue-600 font-semibold">Register</a>
    </p>

    <p id="message" class="text-center mt-4 text-red-500"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

 const firebaseConfig = {
         apiKey: "AIzaSyAW9kGgmQUuWgx-VA0Hro5eV1BTFYYNNys",
  authDomain: "miniproject-cloud-b5740.firebaseapp.com",
  projectId: "miniproject-cloud-b5740",
  storageBucket: "miniproject-cloud-b5740.firebasestorage.app",
  messagingSenderId: "974472965071",
  appId: "1:974472965071:web:87830243f7cefa9675c0ba"
    };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function convertToEmail(meterId){
    return meterId + "@voltaic.com";
}

window.loginUser = async function(){

    const meterId = document.getElementById("meterId").value.trim();
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");

    if(!meterId || !password){
        message.innerText = "All fields required.";
        return;
    }

    const email = convertToEmail(meterId);

    try{
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "hub.html";
    } catch(error){
        message.innerText = "Invalid Meter ID or Password.";
    }
};

</script>

</body>

</html>
